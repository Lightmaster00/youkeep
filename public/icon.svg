<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)"/>
  
  <!-- Icon Graphics: A Bookmark/Keep combined with a Play Button -->
  <g filter="url(#shadow)" transform="translate(128, 128)">
    <!-- Play Triangle -->
    <path d="M120 70 L200 128 L120 186 Z" fill="#ffffff" />
    <!-- Outer Shield/Bookmark Shape -->
    <path d="M40 0 H216 C229.25 0 240 10.75 240 24 V240 L128 176 L16 240 V24 C16 10.75 26.75 0 40 0 Z" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
